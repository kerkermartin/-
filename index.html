<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>內惟單字王：預習優先版</title>
    <style>
        :root { --p: #6c5ce7; --s: #a29bfe; --acc: #00b894; --dmg: #ff7675; --dark: #0f0c29; --gold: #f1c40f; --study: #00cec9; }
        body { margin: 0; background: #0f0c29; color: white; font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #game-container { width: 95%; max-width: 800px; background: rgba(0, 0, 0, 0.95); border: 3px solid var(--p); border-radius: 20px; padding: 25px; box-shadow: 0 0 50px var(--p); text-align: center; }
        .hidden { display: none !important; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .home-link { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #aaa; padding: 6px 12px; border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .user-tag { color: var(--gold); font-weight: bold; }
        .section-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #444; }
        .section-title { font-size: 1.2rem; color: var(--study); margin-bottom: 15px; font-weight: bold; }
        
        input[type="text"] { background: rgba(255,255,255,0.1); border: 2px solid var(--s); border-radius: 10px; color: white; padding: 12px; font-size: 1.2rem; text-align: center; width: 80%; outline: none; margin-bottom: 10px; }
        .menu-grid { display: grid; gap: 10px; }
        button { background: rgba(255,255,255,0.1); border: 2px solid var(--s); color: white; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        button:hover { background: var(--p); transform: translateY(-2px); }
        
        /* 學習瀏覽樣式 */
        .study-list { text-align: left; max-height: 400px; overflow-y: auto; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 10px; }
        .study-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #333; }
        .word-info b { font-size: 1.3rem; color: var(--study); }
        .ipa { color: var(--gold); font-family: 'Segoe UI', sans-serif; margin-left: 8px; font-size: 0.95rem; }
        .zh-text { color: #ccc; font-size: 0.95rem; display: block; margin-top: 4px; }

        /* 排行榜樣式 */
        .rank-container { margin-top: 15px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; }
        .rank-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab-btn { flex: 1; font-size: 0.75rem; padding: 8px; background: transparent; border: 1px solid #555; border-radius: 5px; color: #888; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: black; border-color: var(--gold); }
        .rank-table { width: 100%; font-size: 0.85rem; border-collapse: collapse; }
        .rank-table th, .rank-table td { padding: 8px; border-bottom: 1px solid #333; }

        /* 遊戲介面樣式 */
        #display-box { min-height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 15px 0; border: 1px dashed #555; border-radius: 15px; background: rgba(255,255,255,0.03); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option-item { background: #2d3436; border: 2px solid #636e72; padding: 18px; border-radius: 12px; cursor: pointer; }
        .option-item.selected { border-color: #fff; background: var(--p); }
        #spell-input { width: 85%; font-size: 2rem; border: none; border-bottom: 3px solid var(--s); margin-bottom: 20px; color: white; background: transparent; text-align: center; outline: none; }
        .status-ok { color: var(--acc); font-weight: bold; }
        .status-no { color: var(--dmg); font-weight: bold; }
        .summary-table { width: 100%; text-align: left; font-size: 0.9rem; border-collapse: collapse; }
        .summary-table th, .summary-table td { padding: 10px; border-bottom: 1px solid #444; }
        .replay-btn { background: var(--gold); color: black; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-page">
        <h1 style="color:var(--gold); margin-bottom:30px;">🏆 內惟單字王 🏆</h1>
        
        <div class="section-box">
            <div class="section-title">📖 自由學習模式</div>
            <div class="menu-grid">
                <button style="background:var(--study); color:black; font-weight:bold; border:none;" onclick="openStudyMode()">免登入：瀏覽單字與音標</button>
            </div>
        </div>

        <div class="section-box">
            <div class="section-title">✍️ 挑戰測驗模式</div>
            <input type="text" id="username-input" placeholder="請輸入姓名以計分..." maxlength="10">
            <div class="menu-grid">
                <button onclick="handleLogin()" style="background:var(--acc); color:black; font-weight:bold; border:none;">進入挑戰</button>
            </div>
            
            <div class="rank-container">
                <div class="rank-tabs">
                    <button class="tab-btn active" onclick="updateRankUI('choice', event)">選擇榜</button>
                    <button class="tab-btn" onclick="updateRankUI('listen-choice', event)">聽力榜</button>
                    <button class="tab-btn" onclick="updateRankUI('spell', event)">拼字榜</button>
                    <button class="tab-btn" onclick="updateRankUI('dictation', event)">聽寫榜</button>
                </div>
                <table class="rank-table"><thead><tr><th>#</th><th>姓名</th><th>得分</th><th>用時</th></tr></thead><tbody id="rank-body"></tbody></table>
            </div>
        </div>
    </div>

    <div id="test-menu" class="hidden">
        <div class="top-nav"><div class="user-tag">👤 考生：<span id="display-user"></span></div><div class="home-link" onclick="location.reload()">切換帳號</div></div>
        <div class="menu-grid">
            <button onclick="showSubMenu('choice')">📜 英漢選擇</button>
            <button onclick="showSubMenu('listen-choice')">🎧 聽力選擇</button>
            <button onclick="showSubMenu('spell')">✏️ 拼字挑戰</button>
            <button style="background:#e67e22" onclick="showSubMenu('dictation')">🎤 聽音拼字</button>
        </div>
    </div>

    <div id="study-mode" class="hidden">
        <div class="top-nav"><div class="home-link" onclick="closeStudyMode()">⬅ 返回入口</div><div class="user-tag">單字預習中</div></div>
        <div id="study-letter-btns" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap:5px; margin-bottom:15px;"></div>
        <div class="study-list" id="study-list-content"></div>
    </div>

    <div id="sub-menu" class="hidden">
        <div class="top-nav"><div class="home-link" onclick="goBackMenu()">⬅ 返回選單</div><div class="user-tag">題庫範圍</div></div>
        <div id="sub-buttons" class="menu-grid"></div>
        <div id="letter-zone" class="hidden">
            <hr style="border:0.5px solid #333; margin:20px 0;">
            <div id="letter-buttons" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap:5px;"></div>
        </div>
    </div>

    <div id="game-play" class="hidden">
        <div class="top-nav"><div class="home-link" onclick="location.reload()">🏠 終止</div><div id="q-info" class="user-tag"></div></div>
        <div id="display-box">
            <button id="replay-btn" class="replay-btn hidden" onclick="playAudio()">🔊 點我重聽</button>
            <div id="q-content" style="font-size: 2.2rem; font-weight: bold;"></div>
        </div>
        <div id="choice-area" class="options-grid hidden"></div>
        <div id="spell-area" class="hidden"><input type="text" id="spell-input" autocomplete="off" spellcheck="false"></div>
        <div id="feedback" style="height:1.5rem; margin:15px 0;"></div>
        <button id="submit-btn" onclick="processSubmit()" style="background:var(--acc); color:black; width:100%; font-weight:bold;">確認答案</button>
        <button id="next-btn" onclick="goNext()" class="hidden" style="background:var(--p); width:100%;">下一題</button>
    </div>

    <div id="result-report" class="hidden">
        <h2 id="res-score" style="color:var(--gold)"></h2>
        <div style="max-height: 350px; overflow-y: auto; background: rgba(255,255,255,0.05); border-radius: 10px;">
            <table class="summary-table">
                <thead><tr><th>單字</th><th>中文</th><th>結果</th></tr></thead>
                <tbody id="report-body"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; width:100%; background:var(--p);">返回首頁</button>
    </div>
</div>

        {en:"waiter", ipa:"/ˈweɪtər/", zh:"服務生"},{en:"wife", ipa:"/waɪf/", zh:"老婆"},{en:"wish", ipa:"/wɪʃ/", zh:"希望"},{en:"warm", ipa:"/wɔrm/", zh:"溫暖的"},{en:"wild", ipa:"/waɪld/", zh:"野外的"},{en:"without", ipa:"/wɪˈðaʊt/", zh:"沒有"},{en:"west", ipa:"/wɛst/", zh:"西方"},{en:"will", ipa:"/wɪl/", zh:"將會"},{en:"wonderful", ipa:"/ˈwʌndərfəl/", zh:"美妙的"},{en:"wheel", ipa:"/wil/", zh:"輪胎"},{en:"winner", ipa:"/ˈwɪnər/", zh:"冠軍"},{en:"wood", ipa:"/wʊd/", zh:"木頭"},{en:"while", ipa:"/waɪl/", zh:"當"},{en:"winter", ipa:"/ˈwɪntər/", zh:"冬天"},{en:"worried", ipa:"/ˈwɜrid/", zh:"擔心的"},
        {en:"x-ray", ipa:"/ˈɛksˌreɪ/", zh:"x光"},{en:"yet", ipa:"/jɛt/", zh:"但是"},{en:"zero", ipa:"/ˈzɪroʊ/", zh:"零"}
    ];

    let state = { name:"", mode:"", sub:"", quiz:[], cur:0, results:[], start:0 };

    /* --- 核心切換邏輯 --- */
    function openStudyMode() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('study-mode').classList.remove('hidden');
        const btnBox = document.getElementById('study-letter-btns');
        btnBox.innerHTML = '';
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
            const b = document.createElement('button'); b.innerText = l;
            b.onclick = () => renderStudyList(l);
            btnBox.appendChild(b);
        });
        renderStudyList('A');
    }

    function closeStudyMode() {
        document.getElementById('study-mode').classList.add('hidden');
        document.getElementById('start-page').classList.remove('hidden');
    }

    function handleLogin() {
        const v = document.getElementById('username-input').value.trim();
        if(!v) return alert("請輸入姓名後再挑戰！");
        state.name = v;
        document.getElementById('display-user').innerText = v;
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('test-menu').classList.remove('hidden');
    }

    /* --- 原有功能維持 --- */
    function renderStudyList(l) {
        const list = allWords.filter(w => w.en[0].toUpperCase() === l);
        const box = document.getElementById('study-list-content');
        box.innerHTML = list.length ? '' : `<p style="text-align:center; color:#888;">該字母目前無單字</p>`;
        list.forEach(w => {
            box.innerHTML += `<div class="study-item">
                <div class="word-info">
                    <b>${w.en}</b> <span class="ipa">${w.ipa}</span>
                    <span class="zh-text">${w.zh}</span>
                </div>
                <button onclick="speakText('${w.en}')">🔊</button>
            </div>`;
        });
    }

    function speakText(txt) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(txt);
        m.rate = 0.7; m.lang = 'en-US';
        window.speechSynthesis.speak(m);
    }

    function showSubMenu(m) {
        state.mode = m;
        document.getElementById('test-menu').classList.add('hidden');
        document.getElementById('sub-menu').classList.remove('hidden');
        document.getElementById('sub-buttons').innerHTML = `<button onclick="setup('dict-AM')">大區 A ~ M</button><button onclick="setup('dict-NZ')">大區 N ~ Z</button>`;
        document.getElementById('letter-zone').classList.remove('hidden');
        const lBtns = document.getElementById('letter-buttons'); lBtns.innerHTML = '';
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
            const b = document.createElement('button'); b.innerText = l;
            b.onclick = () => setup('letter-'+l);
            lBtns.appendChild(b);
        });
    }

    function setup(sub) {
        let pool = [];
        if(sub.startsWith('letter-')) {
            const char = sub.split('-')[1];
            pool = allWords.filter(w => w.en[0].toUpperCase() === char);
        } else {
            const r = sub.split('-')[1];
            pool = allWords.filter(w => r==='AM' ? w.en[0].toUpperCase()<='M' : w.en[0].toUpperCase()>='N');
        }
        if(!pool.length) return alert("此範圍尚無單字");
        let count = sub.includes('letter') ? Math.min(15, Math.max(1, Math.ceil(pool.length/2))) : 15;
        state.quiz = pool.sort(()=>Math.random()-0.5).slice(0, count);
        state.cur = 0; state.results = []; state.start = Date.now();
        document.getElementById('sub-menu').classList.add('hidden');
        document.getElementById('game-play').classList.remove('hidden');
        render();
    }

    function render() {
        const q = state.quiz[state.cur];
        document.getElementById('q-info').innerText = `${state.cur+1} / ${state.quiz.length}`;
        document.getElementById('feedback').innerText = '';
        document.getElementById('submit-btn').classList.remove('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        const rb = document.getElementById('replay-btn');
        const cA = document.getElementById('choice-area');
        const sA = document.getElementById('spell-area');
        cA.classList.add('hidden'); sA.classList.add('hidden'); rb.classList.add('hidden');

        if(state.mode.includes('choice')) {
            document.getElementById('q-content').innerText = (state.mode==='listen-choice') ? '👂 聽音辨義' : q.en;
            if(state.mode==='listen-choice') { rb.classList.remove('hidden'); speakText(q.en); }
            makeChoices(); cA.classList.remove('hidden');
        } else {
            document.getElementById('q-content').innerText = (state.mode==='dictation') ? '👂 聽音拼字' : q.zh;
            if(state.mode==='dictation') { rb.classList.remove('hidden'); speakText(q.en); }
            sA.classList.remove('hidden');
            document.getElementById('spell-input').value = '';
            setTimeout(()=>document.getElementById('spell-input').focus(), 300);
        }
    }

    function makeChoices() {
        const area = document.getElementById('choice-area'); area.innerHTML = '';
        const correct = state.quiz[state.cur].zh;
        let opts = [correct];
        while(opts.length < 4) {
            let r = allWords[Math.floor(Math.random()*allWords.length)].zh;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(()=>Math.random()-0.5).forEach(o => {
            const d = document.createElement('div'); d.className = 'option-item';
            d.innerText = o; d.onclick = () => {
                document.querySelectorAll('.option-item').forEach(x => x.classList.remove('selected'));
                d.classList.add('selected');
            };
            area.appendChild(d);
        });
    }

    function processSubmit() {
        const q = state.quiz[state.cur];
        let userAns = "", ok = false;
        if(state.mode.includes('choice')) {
            const s = document.querySelector('.option-item.selected');
            if(!s) return alert("請選擇一個答案");
            userAns = s.innerText; ok = (userAns === q.zh);
        } else {
            userAns = document.getElementById('spell-input').value.trim();
            ok = (userAns.toLowerCase() === q.en.toLowerCase());
        }
        state.results.push({ en: q.en, zh: q.zh, ok: ok });
        const f = document.getElementById('feedback');
        f.innerText = ok ? "⭕ 正確！" : `❌ 錯誤 (正解: ${q.en})`;
        f.className = ok ? "status-ok" : "status-no";
        document.getElementById('submit-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function goNext() {
        state.cur++;
        if(state.cur < state.quiz.length) render();
        else finishGame();
    }

    function finishGame() {
        const sec = Math.round((Date.now() - state.start)/1000);
        const score = Math.round((state.results.filter(r=>r.ok).length / state.quiz.length)*100);
        let rks = JSON.parse(localStorage.getItem('NW_V5')) || { choice:[], 'listen-choice':[], spell:[], dictation:[] };
        rks[state.mode].push({ name: state.name, score, time: sec });
        rks[state.mode].sort((a,b) => b.score - a.score || a.time - b.time);
        localStorage.setItem('NW_V5', JSON.stringify(rks));

        document.getElementById('game-play').classList.add('hidden');
        document.getElementById('result-report').classList.remove('hidden');
        document.getElementById('res-score').innerText = `結算：${score}分 | 用時：${sec}秒`;
        const rb = document.getElementById('report-body'); rb.innerHTML = '';
        state.results.forEach(r => {
            rb.innerHTML += `<tr><td>${r.en}</td><td>${r.zh}</td><td class="${r.ok?'status-ok':'status-no'}">${r.ok?'⭕':'❌'}</td></tr>`;
        });
    }

    function updateRankUI(m, e) {
        if(e) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); e.target.classList.add('active'); }
        const b = document.getElementById('rank-body'); b.innerHTML = '';
        const data = (JSON.parse(localStorage.getItem('NW_V5')) || {})[m] || [];
        if(!data.length) b.innerHTML = '<tr><td colspan="4">尚無紀錄</td></tr>';
        else data.slice(0,5).forEach((r,i) => b.innerHTML += `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.score}</td><td>${r.time}s</td></tr>`);
    }

    function goBackMenu() { document.getElementById('sub-menu').classList.add('hidden'); document.getElementById('test-menu').classList.remove('hidden'); }
    window.onload = () => updateRankUI('choice');
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>內惟單字王：全功能官方校訂版</title>
    <style>
        :root { --p: #6c5ce7; --s: #a29bfe; --acc: #00b894; --dmg: #ff7675; --dark: #0f0c29; --gold: #f1c40f; }
        body { margin: 0; background: #0f0c29; color: white; font-family: 'Microsoft JhengHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #game-container { width: 95%; max-width: 800px; background: rgba(0, 0, 0, 0.95); border: 3px solid var(--p); border-radius: 20px; padding: 25px; box-shadow: 0 0 50px var(--p); text-align: center; }
        .hidden { display: none !important; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .home-link { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #aaa; padding: 6px 12px; border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .user-tag { color: var(--gold); font-weight: bold; }
        input[type="text"] { background: rgba(255,255,255,0.1); border: 2px solid var(--s); border-radius: 10px; color: white; padding: 12px; font-size: 1.2rem; text-align: center; width: 80%; outline: none; }
        .menu-grid { display: grid; gap: 10px; margin-top: 15px; }
        button { background: rgba(255,255,255,0.1); border: 2px solid var(--s); color: white; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        button:hover { background: var(--p); transform: translateY(-2px); }
        .rank-container { margin-top: 25px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid #444; }
        .rank-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab-btn { flex: 1; font-size: 0.8rem; padding: 8px; background: transparent; border: 1px solid #555; border-radius: 5px; color: #888; }
        .tab-btn.active { background: var(--gold); color: black; border-color: var(--gold); }
        .rank-table { width: 100%; font-size: 0.85rem; border-collapse: collapse; }
        .rank-table th, .rank-table td { padding: 8px; border-bottom: 1px solid #333; }
        #display-box { min-height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 15px 0; border: 1px dashed #555; border-radius: 15px; background: rgba(255,255,255,0.03); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option-item { background: #2d3436; border: 2px solid #636e72; padding: 18px; border-radius: 12px; cursor: pointer; }
        .option-item.selected { border-color: #fff; background: var(--p); }
        .option-item.correct { background: var(--acc) !important; color: #000; font-weight: bold; }
        .option-item.wrong { background: var(--dmg) !important; }
        #spell-input { width: 85%; font-size: 2rem; border: none; border-bottom: 3px solid var(--s); margin-bottom: 20px; color: white; background: transparent; text-align: center; }
        .status-ok { color: var(--acc); font-weight: bold; }
        .status-no { color: var(--dmg); font-weight: bold; }
        .summary-table { width: 100%; text-align: left; font-size: 0.9rem; }
        .replay-btn { background: var(--gold); color: black; border: none; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="login-page">
        <h1 style="color:var(--gold)">🏆 內惟單字王 🏆</h1>
        <input type="text" id="username-input" placeholder="請輸入姓名..." maxlength="10">
        <div class="menu-grid"><button onclick="handleLogin()" style="background:var(--acc); color:black; font-weight:bold;">進入系統</button></div>
        <div class="rank-container">
            <div class="rank-tabs">
                <button class="tab-btn active" onclick="updateRankUI('choice', event)">選擇榜</button>
                <button class="tab-btn" onclick="updateRankUI('listen-choice', event)">聽力榜</button>
                <button class="tab-btn" onclick="updateRankUI('spell', event)">拼字榜</button>
                <button class="tab-btn" onclick="updateRankUI('dictation', event)">聽寫榜</button>
            </div>
            <table class="rank-table"><thead><tr><th>#</th><th>姓名</th><th>得分</th><th>用時</th></tr></thead><tbody id="rank-body"></tbody></table>
        </div>
    </div>

    <div id="main-menu" class="hidden">
        <div class="top-nav"><div class="user-tag">👤 <span id="display-user"></span></div><div class="home-link" onclick="location.reload()">登出</div></div>
        <div class="menu-grid">
            <button onclick="showSubMenu('choice')">📜 英漢選擇</button>
            <button onclick="showSubMenu('listen-choice')">🎧 聽力選擇</button>
            <button onclick="showSubMenu('spell')">✏️ 拼字挑戰</button>
            <button style="background:#e67e22" onclick="showSubMenu('dictation')">🎤 聽音拼字</button>
        </div>
    </div>

    <div id="sub-menu" class="hidden">
        <div class="top-nav"><div class="home-link" onclick="goBackMenu()">⬅ 返回</div><div class="user-tag">題庫範圍</div></div>
        <div id="sub-buttons" class="menu-grid"></div>
        <div id="letter-zone" class="hidden">
            <hr style="border:0.5px solid #333; margin:20px 0;">
            <div id="letter-buttons" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap:5px;"></div>
        </div>
    </div>

    <div id="game-play" class="hidden">
        <div class="top-nav"><div class="home-link" onclick="location.reload()">🏠 終止</div><div id="q-info" class="user-tag"></div></div>
        <div id="display-box">
            <button id="replay-btn" class="replay-btn hidden" onclick="play()">🔊 點我重聽</button>
            <div id="q-content" style="font-size: 2.2rem; font-weight: bold;"></div>
        </div>
        <div id="choice-area" class="options-grid hidden"></div>
        <div id="spell-area" class="hidden"><input type="text" id="spell-input" autocomplete="off" spellcheck="false"></div>
        <div id="feedback" style="height:1.5rem; margin:15px 0;"></div>
        <button id="submit-btn" onclick="processSubmit()" style="background:var(--acc); color:black; width:100%; font-weight:bold;">確認答案</button>
        <button id="next-btn" onclick="goNext()" class="hidden" style="background:var(--p); width:100%;">下一題</button>
    </div>

    <div id="result-report" class="hidden">
        <h2 id="res-score" style="color:var(--gold)"></h2>
        <div style="max-height: 300px; overflow-y: auto; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px;">
            <table class="summary-table">
                <thead><tr><th>單字</th><th>中文</th><th>結果</th></tr></thead>
                <tbody id="report-body"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; width:100%; background:var(--p);">返回首頁</button>
    </div>
</div>

        {en:"salt",zh:"鹽巴"},{en:"singer",zh:"歌手"},{en:"spend",zh:"花費"},{en:"save",zh:"保存"},{en:"skyscraper",zh:"摩天大樓"},{en:"spot",zh:"地點"},{en:"score",zh:"分數"},{en:"smell",zh:"聞"},{en:"spring",zh:"春天"},{en:"screen",zh:"螢幕"},{en:"snack",zh:"零食"},{en:"stadium",zh:"體育館"},{en:"search",zh:"尋找"},{en:"so",zh:"所以"},{en:"stage",zh:"舞台"},{en:"secret",zh:"秘密"},{en:"somewhere",zh:"某個地方"},{en:"stay",zh:"待"},{en:"September",zh:"九月"},{en:"soon",zh:"不久"},{en:"still",zh:"仍然"},{en:"several",zh:"好幾個"},{en:"sound",zh:"聲音"},{en:"strange",zh:"奇怪"},{en:"shelf",zh:"書架"},{en:"south",zh:"南方"},{en:"suddenly",zh:"突然"},{en:"should",zh:"應該"},{en:"space",zh:"空間"},{en:"summer",zh:"夏天"},{en:"silver",zh:"銀色"},{en:"speak",zh:"說"},{en:"surprise",zh:"驚喜"},{en:"since",zh:"自從"},{en:"special",zh:"特別的"},{en:"swing",zh:"擺動"},

        {en:"x-ray",zh:"x光"},{en:"yet",zh:"但是"},{en:"zero",zh:"零"}

    let state = { name:"", mode:"", sub:"", quiz:[], cur:0, results:[], start:0 };

    function handleLogin() {
        const val = document.getElementById('username-input').value.trim();
        if(!val) return alert("請輸入姓名");
        state.name = val;
        document.getElementById('display-user').innerText = val;
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('main-menu').classList.remove('hidden');
    }

    function showSubMenu(m) {
        state.mode = m;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('sub-menu').classList.remove('hidden');
        const btns = document.getElementById('sub-buttons');
        const lZone = document.getElementById('letter-zone');
        btns.innerHTML = `<button onclick="setup('dict-AM')">大區 A~M</button><button onclick="setup('dict-NZ')">大區 N~Z</button>`;
        lZone.classList.remove('hidden');
        const lBtns = document.getElementById('letter-buttons'); lBtns.innerHTML = '';
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
            const b = document.createElement('button'); b.innerText = l;
            b.onclick = () => setup('letter-'+l);
            lBtns.appendChild(b);
        });
    }

    function setup(sub) {
        state.sub = sub;
        let pool = [...allWords];
        if(sub.startsWith('letter-')) {
            const char = sub.split('-')[1];
            pool = allWords.filter(w => w.en[0].toUpperCase() === char);
        } else {
            const range = sub.split('-')[1];
            pool = allWords.filter(w => range==='AM' ? w.en[0].toUpperCase()<='M' : w.en[0].toUpperCase()>='N');
        }
        if(!pool.length) return alert("範圍內無單字");
        let count = sub.includes('letter') ? Math.min(15, Math.ceil(pool.length/2)) : 15;
        state.quiz = pool.sort(()=>Math.random()-0.5).slice(0, count);
        state.cur = 0; state.results = []; state.start = Date.now();
        document.getElementById('sub-menu').classList.add('hidden');
        document.getElementById('game-play').classList.remove('hidden');
        render();
    }

    function render() {
        const q = state.quiz[state.cur];
        document.getElementById('q-info').innerText = `${state.cur+1} / ${state.quiz.length}`;
        document.getElementById('feedback').innerText = '';
        document.getElementById('submit-btn').classList.remove('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        const qBox = document.getElementById('q-content');
        const cA = document.getElementById('choice-area');
        const sA = document.getElementById('spell-area');
        const rb = document.getElementById('replay-btn');
        cA.classList.add('hidden'); sA.classList.add('hidden'); rb.classList.add('hidden');

        if(state.mode.includes('choice')) {
            qBox.innerText = (state.mode==='listen-choice') ? '👂 聽音辨義' : q.en;
            if(state.mode==='listen-choice') { rb.classList.remove('hidden'); play(); }
            makeChoices();
            cA.classList.remove('hidden');
        } else {
            qBox.innerText = (state.mode==='dictation') ? '👂 聽音拼字' : q.zh;
            if(state.mode==='dictation') { rb.classList.remove('hidden'); play(); }
            sA.classList.remove('hidden');
            document.getElementById('spell-input').value = '';
            setTimeout(()=>document.getElementById('spell-input').focus(), 300);
        }
    }

    function play() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(state.quiz[state.cur].en);
        msg.rate = 0.7; msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function makeChoices() {
        const area = document.getElementById('choice-area'); area.innerHTML = '';
        const correct = state.quiz[state.cur].zh;
        let opts = [correct];
        while(opts.length < 4) {
            let r = allWords[Math.floor(Math.random()*allWords.length)].zh;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(()=>Math.random()-0.5).forEach(o => {
            const d = document.createElement('div'); d.className = 'option-item';
            d.innerText = o; d.onclick = () => {
                document.querySelectorAll('.option-item').forEach(x => x.classList.remove('selected'));
                d.classList.add('selected');
            };
            area.appendChild(d);
        });
    }

    function processSubmit() {
        const q = state.quiz[state.cur];
        let userAns = "";
        let ok = false;
        if(state.mode.includes('choice')) {
            const s = document.querySelector('.option-item.selected');
            if(!s) return;
            userAns = s.innerText; ok = (userAns === q.zh);
        } else {
            userAns = document.getElementById('spell-input').value.trim();
            ok = (userAns.toLowerCase() === q.en.toLowerCase());
        }
        state.results.push({ en: q.en, zh: q.zh, user: userAns, ok: ok });
        const f = document.getElementById('feedback');
        f.innerText = ok ? "⭕ 正確" : `❌ 錯誤 (答案: ${q.en})`;
        f.className = ok ? "status-ok" : "status-no";
        document.getElementById('submit-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function goNext() {
        state.cur++;
        if(state.cur < state.quiz.length) render();
        else finish();
    }

    function finish() {
        const sec = Math.round((Date.now() - state.start)/1000);
        const score = Math.round((state.results.filter(r=>r.ok).length / state.quiz.length)*100);
        
        // 排行榜更新
        let rs = JSON.parse(localStorage.getItem('NW_RANK_V2')) || { choice:[], 'listen-choice':[], spell:[], dictation:[] };
        rs[state.mode].push({ name: state.name, score, time: sec });
        rs[state.mode].sort((a,b) => b.score - a.score || a.time - b.time);
        localStorage.setItem('NW_RANK_V2', JSON.stringify(rs));

        // 送出表單
        const p = new URLSearchParams();
        p.append(GOOGLE_CONFIG.entryName, state.name); p.append(GOOGLE_CONFIG.entryScore, score);
        p.append(GOOGLE_CONFIG.entryTime, sec); p.append(GOOGLE_CONFIG.entryMode, state.mode);
        fetch(GOOGLE_CONFIG.url, { method: "POST", mode: "no-cors", body: p });

        // 顯示結果總覽
        document.getElementById('game-play').classList.add('hidden');
        document.getElementById('result-report').classList.remove('hidden');
        document.getElementById('res-score').innerText = `得分：${score} | 用時：${sec}秒`;
        const rb = document.getElementById('report-body'); rb.innerHTML = '';
        state.results.forEach(r => {
            rb.innerHTML += `<tr><td>${r.en}</td><td>${r.zh}</td><td class="${r.ok?'status-ok':'status-no'}">${r.ok?'⭕':'❌'}</td></tr>`;
        });
    }

    function updateRankUI(m, e) {
        if(e) { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); e.target.classList.add('active'); }
        const b = document.getElementById('rank-body'); b.innerHTML = '';
        const data = (JSON.parse(localStorage.getItem('NW_RANK_V2')) || {})[m] || [];
        if(!data.length) b.innerHTML = '<tr><td colspan="4">尚無數據</td></tr>';
        else data.slice(0,5).forEach((r,i) => b.innerHTML += `<tr><td>${i+1}</td><td>${r.name}</td><td>${r.score}</td><td>${r.time}s</td></tr>`);
    }

    function goBackMenu() { document.getElementById('sub-menu').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); }
    window.onload = () => updateRankUI('choice');
</script>
</body>
</html>
